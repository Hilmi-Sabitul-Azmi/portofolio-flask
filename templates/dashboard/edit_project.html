{% extends 'dashboard/dashboard_base.html' %}

{% block title %}Edit Proyek{% endblock %}

{% block dashboard_content %}
<h1>Edit Proyek</h1>

<form method="POST" enctype="multipart/form-data">
    <label for="title">Judul Proyek</label>
    <input type="text" id="title" name="title" value="{{ project.title }}" required>

    <label for="description">Deskripsi</label>
    <textarea id="description" name="description" required>{{ project.description }}</textarea>

    <label for="technologies">Teknologi (pisahkan dengan koma)</label>
    <input type="text" id="technologies" name="technologies" value="{{ project.technologies }}">

    <label for="github_link">Link GitHub</label>
    <input type="url" id="github_link" name="github_link" value="{{ project.github_link }}">

    <label for="live_link">Link Website Live</label>
    <input type="url" id="live_link" name="live_link" value="{{ project.live_link }}">

    <p>Gambar saat ini:</p>
    <img src="{{ url_for('static', filename='uploads/' + project.image_file) }}" width="150">

    <label for="image">Ganti Gambar (opsional, kosongkan jika tidak ingin mengganti)</label>
    <input type="file" id="image" name="image" accept="image/*">

    <button type="submit">Simpan Perubahan</button>
</form>

<a href="{{ url_for('dashboard_projects') }}">← Kembali ke Daftar Proyek</a>
{% endblock %}
